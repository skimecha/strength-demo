<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Strength Tracker Demo</title>
<meta name="description" content="Interactive demo of Strength Tracker, a mobile-first fitness tracking PWA built by Matt Breckenridge. Pre-loaded with sample data; everything runs in your browser.">
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#232635;--border:#2e3248;
  --text:#f0f2f8;--text-muted:#a0a8c0;
  --accent:#4f8ef7;--accent-dim:#1e3a6e;
  --green:#3ecf8e;--green-dim:#0f3d29;
  --amber:#f59e0b;--amber-dim:#3d2a00;
  --red:#f87171;--red-dim:#3d1212;
  --radius:12px;--radius-sm:8px;
}
html.light{
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#eef1f7;--border:#d8dde9;
  --text:#161922;--text-muted:#5b6478;
  --accent:#2f6fe0;--accent-dim:#dde9fd;
  --green:#1fa971;--green-dim:#d6f3e6;
  --amber:#c9780a;--amber-dim:#fbe9c8;
  --red:#dc4747;--red-dim:#fbdada;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}

.demo-banner{background:var(--accent-dim);border-bottom:2px solid var(--accent);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.demo-banner-text{font-size:12px;font-weight:700;color:var(--accent)}
.demo-banner-btn{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0}
/* ── LOADING ── */
#screen-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── AUTH ── */
#screen-auth{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px}
.auth-title{font-size:22px;font-weight:900;color:var(--text);text-align:center}
.auth-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-top:-6px}
.auth-divider{display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;border-top:1px solid var(--border)}
.auth-link{text-align:center;font-size:13px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px;width:100%}
.btn-google{background:#fff;color:#333;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700;width:100%;padding:13px;border:1px solid #ddd;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;transition:opacity .15s}
.btn-google:active{opacity:.8}
.auth-msg{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;display:none}
.auth-msg.error{background:var(--red-dim);border:1px solid var(--red);color:var(--red);display:block}
.auth-msg.success{background:var(--green-dim);border:1px solid var(--green);color:var(--green);display:block}

/* ── APP ── */
#screen-app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;overflow:hidden;display:none;flex-direction:column}
.nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:9px 4px 12px;background:none;border:none;border-top:2px solid transparent;color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav-btn svg{width:20px;height:20px}
.nav-btn.active{color:var(--accent);border-top:2px solid var(--accent)}
.view{display:none;flex:1;overflow-y:auto;padding:16px;padding-bottom:24px}
.view.active{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;color:var(--text)}
.btn:active{transform:scale(.97);opacity:.8}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-green{background:var(--green);color:#0a1f16;width:100%}
.btn-outline{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--red-dim);border:1px solid var(--red);color:var(--red)}
.btn-amber{background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber)}
.btn-sm{padding:8px 12px;font-size:13px}
.btn-xs{padding:5px 9px;font-size:12px}
.btn-full{width:100%}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{font-size:13px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:5px}
select,input[type=text],input[type=number],input[type=email],input[type=password],textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:11px 14px;font-size:16px;appearance:none;-webkit-appearance:none}
select:focus,input:focus{outline:none;border-color:var(--accent)}
.field{display:flex;flex-direction:column;gap:5px}
.stepper{display:flex;align-items:stretch}
.stepper-val{flex:1;text-align:center;font-size:26px;font-weight:800;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 4px;color:var(--text)}
.stepper-btn{width:52px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s;user-select:none}
.stepper-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.stepper-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.stepper-btn:active{background:var(--border)}
.increments{display:flex;gap:5px;margin-top:6px}
.inc-btn{flex:1;padding:7px 2px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:background .1s,color .1s}
.inc-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.toggle-group{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.toggle-opt{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s,color .15s;color:var(--text-muted)}
.toggle-opt.active{background:var(--accent);color:#fff}
.muscle-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.muscle-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:border-color .15s,background .15s}
.muscle-btn:active{border-color:var(--accent);background:var(--accent-dim)}
.exercise-list{display:flex;flex-direction:column;gap:8px}
.exercise-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.exercise-item:active{border-color:var(--accent)}
.exercise-name{font-size:14px;font-weight:600;color:var(--text)}
.fav-star{font-size:18px;color:var(--text-muted);flex-shrink:0;padding:4px}
.exercise-item.fav .fav-star{color:var(--amber)}
.set-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px}
.set-badge{font-size:11px;font-weight:800;width:36px;flex-shrink:0;text-align:center}
.set-badge.warmup{color:var(--amber)}
.set-badge.working{color:var(--green)}
.set-info{flex:1;font-size:15px;font-weight:600;color:var(--text)}
.set-del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px 6px}
.history-session{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.history-date{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:8px}
.history-exercise{font-size:14px;font-weight:700;color:var(--text);margin:8px 0 3px}
.history-sets{font-size:13px;color:var(--text-muted);line-height:1.7}
.macro-bar-wrap{background:var(--surface2);border-radius:6px;overflow:hidden;height:8px;margin-top:6px}
.macro-bar{height:100%;border-radius:6px;transition:width .3s;max-width:100%}
.macro-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:2px}
.macro-label{font-weight:700;color:var(--text-muted)}
.macro-val{font-weight:700;color:var(--text)}
.wt-list{display:flex;flex-direction:column;gap:8px}
.wt-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px}
.wt-date{font-size:13px;color:var(--text-muted);font-weight:600}
.wt-val{font-size:18px;font-weight:800;color:var(--text)}
.wt-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-val{font-size:24px;font-weight:800;color:var(--text)}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.page-header{display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:800;color:var(--text)}
.subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
.divider{border:none;border-top:1px solid var(--border)}
.empty{text-align:center;color:var(--text-muted);padding:32px 0;font-size:14px}
.filter-row{display:flex;gap:8px;align-items:center}
.filter-row input{flex:1}
.section-gap{display:flex;flex-direction:column;gap:10px}
.fav-del{background:none;border:none;color:var(--amber);font-size:20px;cursor:pointer;padding:2px 6px;flex-shrink:0;line-height:1}
.pr-card:active{border-color:var(--accent)}
.period-btn{flex-shrink:0;padding:5px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer;transition:background .1s,color .1s,border-color .1s}
.period-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.timer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.timer-card.running{border-color:var(--accent)}
.timer-card.done{border-color:var(--green)}
.timer-display{text-align:center;font-size:52px;font-weight:900;letter-spacing:-.02em;color:var(--text);line-height:1;padding:6px 0 10px;font-variant-numeric:tabular-nums}
.timer-display.running{color:var(--accent)}
.timer-display.done{color:var(--green)}
.timer-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.timer-preset{padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:background .1s,border-color .1s,color .1s}
.timer-preset:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.timer-preset.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.timer-progress{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:10px}
.timer-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear}
.timer-cancel{background:none;border:none;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer;width:100%;padding:6px;margin-top:4px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a1f16;padding:10px 20px;border-radius:20px;font-weight:800;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.modal-title{font-size:18px;font-weight:800;color:var(--text)}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="screen-loading"><div class="spinner"></div></div>

<div id="screen-app">
  <div id="demo-banner-wrap"></div>
  <div id="views-wrap" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
  <div id="nav-wrap"></div>
</div>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<input type="file" id="csv-file-input" accept=".csv" style="display:none">

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Standalone demo build: no backend, no accounts. All data lives in this
// browser's localStorage, pre-seeded with generated sample history.
const APP_VERSION = '2.11.3';
const DEMO_STORAGE_KEY = 'strength-demo-data-v1';

function isDemo(){ return false; }
function demoBlock(){}

// ─── GROUPS & EXERCISES ───────────────────────────────────────────────────────
const GROUPS = {
  'Chest':     ['Chest'],
  'Back':      ['Back','Lats'],
  'Shoulders': ['Delts (Front)','Delts (Middle)','Delts (Rear)'],
  'Arms':      ['Biceps','Triceps','Forearms / Grip'],
  'Core':      ['Abdominals'],
  'Legs':      ['Quads','Hamstrings','Glutes','Calves','Hips']
};

const EXERCISES = {
  'Chest':['Bench Press - Barbell','Bench Press - Dumbell','Cable Fly','Chest Dip','Floor Press - Barbell','Incline Bench Press - Barbell','Incline Bench Press - Dumbell','Incline Fly - Dumbell','Machine Fly','Machine Press','Push-Up'],
  'Back':['Cable Row','Deadlift','Deadlift - Romanian','Dumbell Row - One Arm','Face Pulls','Good Morning - Barbell','Hyperextensions','Machine Row','Meadows Row','Pendlay Row','Rack Pull','Reverse Fly - Dumbell','Reverse Fly - Machine','Row - Barbell','Seal Row','T-Bar Row'],
  'Lats':['Cable Pulldown - Wide Grip','Chin-Up','Diverging Lat Pulldown','Lat Pulldown - Close Grip','Lat Pulldown - Underhand','Machine Assisted Pull-ups','Pull-ups','Straight Arm Pulldown - Cable'],
  'Delts (Front)':['Arnold Press','Cable Front Raise','Dumbell Raise - Standing Front','Military Press - Barbell','Overhead Press - Dumbbell (Seated)','Overhead Press - Machine','Plate Raise'],
  'Delts (Middle)':['Cable Lateral Raise - Hip Height','Cable Raise - Floor Height','Dumbell Raise - Standing Lateral','Machine Lateral Raise','Seated Lateral Raise - Dumbell','Upright Row - Barbell','Upright Row - Dumbell'],
  'Delts (Rear)':['Band Pull-Apart','Dumbell Raise - Seated (Decline)','Face Pulls','Rear Delt Machine Fly','Reverse Fly - Cable','Rotator Cuff - Cable','Rotator Cuff - Flat Bench'],
  'Biceps':['Curls - Barbell','Curls - Cable','Curls - Concentration','Curls - Dumbell (Decline)','Curls - Dumbell (Incline)','Curls - Dumbell (Standing)','Curls - EZ Bar (Standing)','Curls - Machine','Curls - Preacher (EZ Bar)','Curls - Preacher (Flat Bar)','Curls - Preacher (Machine)','Hammer Curls (Preacher)','Hammer Curls (Standing)','Reverse Curls - Barbell','Spider Curls'],
  'Triceps':['Close-Grip Bench Press','Extension - Cable (One-Arm)','Kickbacks - Dumbell','Overhead Extension - Barbell','Overhead Extension - Cable (Two-Hand Bar)','Overhead Extension - Dumbell','Skull Crushers - Barbell','Skull Crushers - Dumbell','Tricep Dips','Tricep Pushdown - Cable (Rope)','Tricep Pushdown - Cable (Two-Hand Bar)'],
  'Forearms / Grip':['Curl - Dumbell','Dead Hang','Farmers Carry','Plate Pinch','Reverse Curl - Dumbell','Wrist Curl - Barbell','Wrist Curl - Dumbell'],
  'Abdominals':['Ab Wheel Rollout','Bicycle Crunch','Cable Crunch','Crunch','Decline Crunch','Hanging Leg Raise','Leg Raise - Lying','Oblique Crunch','Plank','Russian Twist','Side Plank','Sit-Up','Wood Chop - Cable'],
  'Quads':['Box Squat','Bulgarian Split Squats','Front Squat - Barbell','Hack Squat - Machine','Leg Extensions','Leg Press','Lunges','Pistol Squats','Sissy Squats','Squats','Step-Ups'],
  'Hamstrings':['Bulgarian Split Squats','Good Morning - Barbell','Leg Curl - Lying','Leg Curl - Seated','Leg Curl - Standing','Leg Curls','Nordic Curls','RDL','Stiff-Leg Deadlift','Sumo Deadlift'],
  'Glutes':['Bulgarian Split Squats','Cable Kickback','Glute Bridge','Hip Abductors','Hip Adductors','Hip Thrust - Barbell','Hip Thrust - Machine','Lunges','Squats'],
  'Calves':['Calf Raises','Calf Raises - Donkey','Calf Raises - Leg Press','Calf Raises - Seated','Calf Raises - Standing Machine','Tib Raises'],
  'Hips':['Cable Hip Flexion','Clamshells','Hip Abductors','Hip Adductors','Lying Hip Abduction']
};

const CARDIO_ACTIVITIES = ['Running','Walking','Cycling','Rowing','Elliptical','Swimming','Jump Rope','Stair Climber','Hiking','HIIT','Skiing','Other'];

// ─── APP STATE ────────────────────────────────────────────────────────────────
let currentUser = null;
let state = {
  view:'log',logStep:'workout',
  selectedMuscle:null,selectedExercise:null,selectedGroup:null,
  setType:'working',weight:45,reps:10,weightInc:5,repsInc:1,
  pendingSets:[],_currentSession:null,
  sessions:[],prs:{},favorites:[],customExercises:[],
  historyTab:'sessions',
  weightView:'list', weightPeriod:'1m',
  nutritionView:'log', nutritionPeriod:'1m', calorieDisplay:'total',
  timer:{remaining:0,total:0,interval:null,running:false},
  favFilter:false,searchQ:'',
  macroGoals:{calories:2500,protein:180,carbs:250,fat:80},
  foodLog:[],mealFavorites:[],
  weightLog:[],
  weightUnit: localStorage.getItem('li_weight_unit') || 'lbs',
  theme: localStorage.getItem('li_theme') || 'dark',
  cardio:{
    activity:null,
    stopwatch:{running:false,elapsed:0,interval:null},
    distance:'',distUnit:'mi',heartRate:null,
    hrTestStep:'idle',hrTestCountdown:0,hrTestInterval:null,hrBeats:''
  }
};

// ─── DEMO BOOT ────────────────────────────────────────────────────────────────
function showApp(){ document.getElementById('screen-loading').style.display='none'; document.getElementById('screen-app').style.display='flex'; render(); }

function setTheme(t){
  const light = (t === 'light');
  state.theme = t;
  localStorage.setItem('li_theme', t);
  document.documentElement.classList.toggle('light', light);
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.content = light ? '#f4f6fb' : '#0f1117';
}

function applyData(data){
  state.sessions=data.sessions||[]; state.prs=data.prs||{};
  state.favorites=data.favorites||[]; state.customExercises=data.customExercises||[];
  state.foodLog=data.foodLog||[]; state.mealFavorites=data.mealFavorites||[];
  state.weightLog=data.weightLog||[];
  state.macroGoals=data.macroGoals||{calories:2500,protein:180,carbs:250,fat:80};
}

function initDemo(){
  currentUser={id:'demo-user',email:'Demo visitor'};
  let saved=null;
  try { saved=JSON.parse(localStorage.getItem(DEMO_STORAGE_KEY)); } catch(e){}
  if(saved&&Array.isArray(saved.sessions)&&saved.sessions.length){ applyData(saved); }
  else { applyData(generateSeedData()); persist(); }
  showApp();
}

function resetDemoData(){
  if(!confirm('Replace everything with fresh sample data?')) return;
  localStorage.removeItem(DEMO_STORAGE_KEY);
  applyData(generateSeedData()); persist();
  state.view='log'; state.logStep='workout'; state._currentSession=null; state.pendingSets=[];
  swStop(); state.cardio={activity:null,stopwatch:{running:false,elapsed:0,interval:null},distance:'',distUnit:'mi',heartRate:null,hrTestStep:'idle',hrTestCountdown:0,hrTestInterval:null,hrBeats:''};
  toast('Demo data reset ✓'); render();
}

// ─── SEED DATA ────────────────────────────────────────────────────────────────
// Generates ~8 weeks of realistic history relative to today so the demo
// always looks current. Progressive overload on lifts, gradual weight loss,
// and a partially-logged "today" in nutrition.
function generateSeedData(){
  const DAY=86400000, now=new Date(), uid2=()=>Math.random().toString(36).slice(2,11);
  const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const round5=v=>Math.round(v/5)*5;
  const at=(daysAgo,hour,min)=>{ const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()-daysAgo,hour,min||0); return d.getTime(); };

  const sessions=[], prs={}, foodLog=[], weightLog=[];
  const bumpPR=(name,weight,reps,date)=>{ const p=prs[name]; if(!p||weight>p.weight||(weight===p.weight&&reps>p.reps)) prs[name]={weight,reps,date}; };

  const templates=[
    {exercises:[
      {muscle:'Chest',name:'Bench Press - Barbell',base:160},
      {muscle:'Chest',name:'Incline Bench Press - Dumbell',base:55},
      {muscle:'Delts (Middle)',name:'Dumbell Raise - Standing Lateral',base:25},
      {muscle:'Triceps',name:'Tricep Pushdown - Cable (Rope)',base:55}
    ]},
    {exercises:[
      {muscle:'Back',name:'Deadlift',base:265},
      {muscle:'Lats',name:'Lat Pulldown - Close Grip',base:135},
      {muscle:'Back',name:'Cable Row',base:145},
      {muscle:'Biceps',name:'Curls - EZ Bar (Standing)',base:65}
    ]},
    {exercises:[
      {muscle:'Quads',name:'Squats',base:215},
      {muscle:'Hamstrings',name:'RDL',base:175},
      {muscle:'Quads',name:'Leg Press',base:340},
      {muscle:'Calves',name:'Calf Raises - Seated',base:90}
    ]}
  ];
  const cardio=['Running','Cycling','Rowing'];

  for(let week=8; week>=1; week--){
    [6,4,2].forEach((dayOfWeek,idx)=>{
      const daysAgo=week*7-7+dayOfWeek;
      if(daysAgo<1) return;
      const t=templates[idx], date=at(daysAgo,ri(6,18),ri(0,59));
      const exercises=t.exercises.map(ex=>{
        const top=round5(ex.base+(8-week)*(ex.base>120?5:2.5)+ri(-5,5));
        const sets=[{type:'warmup',weight:round5(top*0.6),reps:10}];
        for(let s=0;s<3;s++){ const w=round5(top-(s===2?5:0)); const r=ri(6,10); sets.push({type:'working',weight:w,reps:r}); bumpPR(ex.name,w,r,date); }
        return {muscle:ex.muscle,name:ex.name,sets};
      });
      sessions.push({id:uid2(),date,exercises});
    });
    const cardioDaysAgo=week*7-7+ri(0,1);
    if(cardioDaysAgo>=1){
      const mins=ri(22,40);
      sessions.push({id:uid2(),date:at(cardioDaysAgo,ri(6,9),ri(0,59)),exercises:[{type:'cardio',name:cardio[week%3],duration:mins*60,distance:+(mins/ri(9,11)).toFixed(1),distUnit:'mi',heartRate:ri(138,162)}]});
    }
  }
  sessions.sort((a,b)=>a.date-b.date);

  for(let d=56; d>=0; d-=2){ weightLog.push({id:uid2(),date:at(d,7,ri(0,30)),value:+(193-(56-d)*0.11+(Math.random()*1.6-0.8)).toFixed(1),unit:'lbs'}); }

  const meals=[
    {h:7,m:30,name:'Eggs, Toast & Berries',calories:520,protein:32,carbs:48,fat:22},
    {h:10,m:30,name:'Protein Shake',calories:220,protein:40,carbs:8,fat:3},
    {h:12,m:45,name:'Chicken & Rice Bowl',calories:680,protein:52,carbs:78,fat:14},
    {h:16,m:0,name:'Greek Yogurt & Almonds',calories:310,protein:24,carbs:18,fat:16},
    {h:19,m:15,name:'Salmon, Potatoes & Veg',calories:720,protein:46,carbs:62,fat:28}
  ];
  for(let d=9; d>=0; d--){
    const todayCut=d===0?new Date().getHours():24;
    meals.forEach(meal=>{
      if(meal.h>=todayCut) return;
      if(d>0&&Math.random()<0.12) return;
      const ts=at(d,meal.h,meal.m+ri(-10,10));
      foodLog.push({id:uid2(),date:new Date(ts).toLocaleDateString('en-US'),ts,name:meal.name,calories:meal.calories+ri(-25,25),protein:meal.protein+ri(-3,3),carbs:meal.carbs+ri(-5,5),fat:meal.fat+ri(-2,2)});
    });
  }
  foodLog.sort((a,b)=>a.ts-b.ts);

  return {
    sessions, prs, foodLog, weightLog,
    favorites:['Bench Press - Barbell','Squats','Deadlift'],
    customExercises:[],
    mealFavorites:[
      {id:uid2(),name:'Chicken & Rice Bowl',calories:680,protein:52,carbs:78,fat:14},
      {id:uid2(),name:'Protein Shake',calories:220,protein:40,carbs:8,fat:3}
    ],
    macroGoals:{calories:2500,protein:180,carbs:250,fat:80}
  };
}

}

const uid=()=>(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():Math.random().toString(36).slice(2,9);
function fmtDate(d){ return new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function fmtDateShort(d){ return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtTime(d){ return new Date(d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function todayKey(){ return new Date().toLocaleDateString('en-US'); }
function lbsToKg(v){ return (v*0.453592).toFixed(1); }
function kgToLbs(v){ return (v*2.20462).toFixed(1); }
function displayWeight(entry){
  if(entry.unit===state.weightUnit) return `${entry.value} ${entry.unit}`;
  return state.weightUnit==='kg'?`${lbsToKg(entry.value)} kg`:`${kgToLbs(entry.value)} lbs`;
}
function isMealFav(entry){ return state.mealFavorites.some(f=>f.name===entry.name&&f.calories===entry.calories&&f.protein===entry.protein); }
function toast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color||'var(--green)'; t.style.color=color?'#fff':'#0a1f16';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200);
}

function safeRender(fn, name){
  try { return fn(); }
  catch(e){
    console.error(`render error in ${name}:`, e.message, e.stack);
    return `<div style="padding:20px;color:var(--red);font-size:13px;font-weight:700">⚠ Error in ${name}: ${e.message}</div>`;
  }
}

function workingIdx(i){ let n=0; for(let j=0;j<=i;j++){ if(state.pendingSets[j].type==='working') n++; } return n; }

function renderExerciseHistory(exercise){
  const past=[];
  state.sessions.forEach(s=>{ s.exercises.forEach(ex=>{ if(ex.type==='cardio') return; if(ex.name===exercise){ const working=ex.sets.filter(s=>s.type==='working'); if(working.length) past.push({date:s.date,sets:working}); } }); });
  if(!past.length) return '';
  past.sort((a,b)=>b.date-a.date);
  const shown=past.slice(0,8);
  const overallBest=past.reduce((best,session)=>{ const s=session.sets.reduce((a,b)=>b.weight>a.weight||(b.weight===a.weight&&b.reps>a.reps)?b:a,session.sets[0]); return s.weight>best.weight||(s.weight===best.weight&&s.reps>best.reps)?s:best; },past[0].sets[0]);
  return `<div style="margin-top:8px;border-top:2px dashed var(--border);padding-top:16px"><div class="card-title" style="margin-bottom:12px">Past Sessions — ${exercise}</div><div class="section-gap">${shown.map((session,idx)=>{ const best=session.sets.reduce((b,s)=>s.weight>b.weight||(s.weight===b.weight&&s.reps>b.reps)?s:b,session.sets[0]); const isPR=best.weight===overallBest.weight&&best.reps===overallBest.reps; return `<div style="background:var(--surface);border:1px solid ${idx===0?'var(--accent)':'var(--border)'};border-radius:var(--radius-sm);padding:10px 14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div style="font-size:12px;font-weight:700;color:${idx===0?'var(--accent)':'var(--text-muted)'}">${idx===0?'Most Recent — ':''}${fmtDate(session.date)}</div>${isPR?`<div style="font-size:10px;font-weight:800;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);border-radius:20px;padding:2px 7px">🏆 PR</div>`:''}</div><div style="font-size:13px;color:var(--text-muted);line-height:1.8">${session.sets.map(s=>`<span style="color:var(--text);font-weight:700">${s.weight}lbs</span> × ${s.reps}`).join(' &nbsp;·&nbsp; ')}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">Best: ${best.weight}lbs × ${best.reps} &nbsp;·&nbsp; ${session.sets.length} set${session.sets.length!==1?'s':''}</div></div>`; }).join('')}</div></div>`;
}

      <button class="btn btn-outline btn-sm btn-full" id="hr-test-cancel" style="margin-top:8px">Cancel</button>

}

// ── CARDIO STOPWATCH ──────────────────────────────────────────────────────────
function swStart(){ if(state.cardio.stopwatch.running) return; state.cardio.stopwatch.running=true; state.cardio.stopwatch.interval=setInterval(()=>{ state.cardio.stopwatch.elapsed++; updateSwDOM(); },1000); updateSwDOM(); }
function swStop(){ if(state.cardio?.stopwatch?.interval){ clearInterval(state.cardio.stopwatch.interval); state.cardio.stopwatch.interval=null; } if(state.cardio?.stopwatch) state.cardio.stopwatch.running=false; updateSwDOM(); }
function swReset(){ swStop(); state.cardio.stopwatch.elapsed=0; updateSwDOM(); }
function updateSwDOM(){
  const disp=document.getElementById('sw-display'); if(!disp) return;
  const e=state.cardio.stopwatch.elapsed; const m=Math.floor(e/60); const s=e%60;
  disp.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  disp.style.color=state.cardio.stopwatch.running?'var(--accent)':'var(--text)';
  const btn=document.getElementById('sw-toggle');
  if(btn){ btn.textContent=state.cardio.stopwatch.running?'⏸ Pause':'▶ Start'; btn.className=`btn ${state.cardio.stopwatch.running?'btn-danger':'btn-green'}`; }
}

// ── HR GUIDED TEST ────────────────────────────────────────────────────────────
function hrStartCountdown(){
  state.cardio.hrTestCountdown=3; state.cardio.hrTestStep='countdown'; render();
  state.cardio.hrTestInterval=setInterval(()=>{
    state.cardio.hrTestCountdown--;
    if(state.cardio.hrTestCountdown<=0){
      clearInterval(state.cardio.hrTestInterval); state.cardio.hrTestInterval=null;
      state.cardio.hrTestCountdown=10; state.cardio.hrTestStep='counting'; render();
      state.cardio.hrTestInterval=setInterval(()=>{
        state.cardio.hrTestCountdown--;
        if(state.cardio.hrTestCountdown<=0){ clearInterval(state.cardio.hrTestInterval); state.cardio.hrTestInterval=null; state.cardio.hrTestStep='input'; render(); }
        else { const el=document.querySelector('.hr-circle-progress'); if(el) el.setAttribute('stroke-dashoffset',(282.7*(1-state.cardio.hrTestCountdown/10)).toFixed(1)); }
      },1000);
    } else { const el=document.querySelector('.hr-countdown-display'); if(el) el.textContent=state.cardio.hrTestCountdown; }
  },1000);
}
function hrCancelTest(){ if(state.cardio.hrTestInterval){ clearInterval(state.cardio.hrTestInterval); state.cardio.hrTestInterval=null; } state.cardio.hrTestStep='idle'; state.cardio.hrTestCountdown=0; render(); }

function logCardioActivity(){
  const distInput=document.getElementById('cardio-distance');
  const dist=distInput?parseFloat(distInput.value)||null:null;
  const entry={type:'cardio',name:state.cardio.activity,duration:state.cardio.stopwatch.elapsed,distance:dist,distUnit:state.cardio.distUnit,heartRate:state.cardio.heartRate};
  if(!state._currentSession) state._currentSession={id:uid(),date:Date.now(),exercises:[]};
  state._currentSession.exercises.push(entry);
  swStop();
  state.cardio={activity:null,stopwatch:{running:false,elapsed:0,interval:null},distance:'',distUnit:'mi',heartRate:null,hrTestStep:'idle',hrTestCountdown:0,hrTestInterval:null,hrBeats:''};
  state.logStep='workout'; toast(`${entry.name} logged! 🏃`); render();
}

function fmtDuration(secs){ const m=Math.floor(secs/60); const s=secs%60; return s>0?`${m}m ${s}s`:`${m}m`; }

const PERIODS=['7d','14d','1m','3m','6m','1y','2y'];
function periodMs(p){ const d={'7d':7,'14d':14,'1m':30,'3m':90,'6m':180,'1y':365,'2y':730}; return (d[p]||30)*86400000; }

function renderWeightChartSVG(period,unit){
  const cutoff=Date.now()-periodMs(period);
  const filtered=[...state.weightLog].filter(e=>e.date>=cutoff).sort((a,b)=>a.date-b.date);
  if(filtered.length<2) return `<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:13px">Need at least 2 entries in this period to show a chart</div>`;
  const points=filtered.map(e=>({
    date:e.date,
    weight: unit==='kg'
      ?(e.unit==='kg'?parseFloat(e.value):parseFloat(lbsToKg(e.value)))
      :(e.unit==='lbs'?parseFloat(e.value):parseFloat(kgToLbs(e.value)))
  }));
  return renderProgressChart(points);
}

function renderCalorieBarChart(period){
  const cutoff=Date.now()-periodMs(period);
  const byDate={};
  state.foodLog.forEach(e=>{
    const ms=new Date(e.date).getTime();
    if(ms>=cutoff) byDate[e.date]=(byDate[e.date]||0)+(e.calories||0);
  });
  const entries=Object.entries(byDate).map(([date,cal])=>({date:new Date(date).getTime(),cal})).sort((a,b)=>a.date-b.date);
  if(!entries.length) return `<div class="empty">No nutrition data for this period</div>`;
  const goal=state.macroGoals.calories;
  const W=360,H=180,PAD={top:16,right:28,bottom:28,left:44};
  const cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const maxCal=Math.max(...entries.map(e=>e.cal),goal)*1.1;
  const n=entries.length;
  const barW=Math.min(22,Math.max(4,(cW/n)*0.65));
  const toX=i=>PAD.left+(n===1?cW/2:(i/(n-1))*cW);
  const toY=c=>PAD.top+cH-(c/maxCal)*cH;
  const goalY=toY(goal);
  const yVals=[0,Math.round(maxCal/2),Math.round(maxCal)];
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
    ${yVals.map(c=>{const y=toY(c);return `<line x1="${PAD.left}" y1="${y.toFixed(1)}" x2="${W-PAD.right}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
    <text x="${PAD.left-6}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="var(--text-muted)" font-size="9" font-family="system-ui">${c}</text>`;}).join('')}
    <line x1="${PAD.left}" y1="${goalY.toFixed(1)}" x2="${W-PAD.right}" y2="${goalY.toFixed(1)}" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="${(W-PAD.right+2)}" y="${(goalY-3).toFixed(1)}" fill="var(--amber)" font-size="9" font-family="system-ui">goal</text>
    ${entries.map((e,i)=>{const x=toX(i),y=toY(e.cal),h=Math.max(2,cH-(y-PAD.top));const color=e.cal>goal?'var(--amber)':'var(--accent)';return `<rect x="${(x-barW/2).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="${color}" rx="2"/>`;}).join('')}
    <text x="${toX(0).toFixed(1)}" y="${H-4}" text-anchor="start" fill="var(--text-muted)" font-size="9" font-family="system-ui">${fmtDateShort(entries[0].date)}</text>
    ${n>1?`<text x="${toX(n-1).toFixed(1)}" y="${H-4}" text-anchor="end" fill="var(--text-muted)" font-size="9" font-family="system-ui">${fmtDateShort(entries[n-1].date)}</text>`:''}
  </svg>`;
}

      <button class="btn btn-primary" id="add-food-btn">+ Add Food / Meal</button>
      ${todayEntries.length?`<div class="card"><div class="card-title">Today's Log</div><div class="section-gap">${[...todayEntries].reverse().map(e=>`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;color:var(--text)">${e.name}</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">${fmtTime(e.ts)} · P:${e.protein}g C:${e.carbs}g F:${e.fat}g</div></div><div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div style="font-size:16px;font-weight:800;color:var(--text)">${e.calories} kcal</div><div style="display:flex;gap:6px"><button class="btn btn-xs ${isMealFav(e)?'btn-amber':'btn-outline'}" data-fav-food="${e.id}" title="${isMealFav(e)?'Remove from favorites':'Save as favorite'}">★</button><button class="btn btn-xs btn-danger" data-del-food="${e.id}">✕</button></div></div></div>`).join('<hr class="divider" style="margin:2px 0">')}</div></div>`:''}
      <div style="font-size:11px;color:var(--text-muted);text-align:center">Export all data from the History tab</div>

        ${renderCalorieBarChart(period)}

function macroBar(label,color,val,goal,unit){ const pct=goal>0?Math.min(100,Math.round(val/goal*100)):0; return `<div class="macro-row"><span class="macro-label">${label}</span><span class="macro-val">${val}/${goal}${unit}</span></div><div class="macro-bar-wrap"><div class="macro-bar" style="width:${pct}%;background:${color}"></div></div>`; }

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function attachEvents(){
  const el=(id,fn)=>{ const e=document.getElementById(id); if(e) e.addEventListener('click',fn); };
  const on=(id,ev,fn)=>{ const e=document.getElementById(id); if(e) e.addEventListener(ev,fn); };

  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{ state.view=b.dataset.nav; render(); }));

  // Group → direct to exercise (single muscle) or muscle select (multi)
  document.querySelectorAll('[data-group]').forEach(b=>b.addEventListener('click',()=>{
    const g=b.dataset.group;
    state.selectedGroup=g;
    const muscles=GROUPS[g]||[];
    if(muscles.length===1){ state.selectedMuscle=muscles[0]; state.logStep='exercise'; }
    else state.logStep='muscle';
    state.searchQ=''; render();
  }));

  document.querySelectorAll('[data-muscle]').forEach(b=>b.addEventListener('click',()=>{ state.selectedMuscle=b.dataset.muscle; state.searchQ=''; state.logStep='exercise'; render(); }));
  document.querySelectorAll('[data-exercise]').forEach(b=>b.addEventListener('click',e=>{ if(e.target.closest('[data-fav]')) return; state.selectedExercise=b.dataset.exercise; state.pendingSets=[]; state.logStep='sets'; render(); }));

  document.querySelectorAll('[data-fav]').forEach(b=>b.addEventListener('click',async e=>{ e.stopPropagation(); const ex=b.dataset.fav; const idx=state.favorites.indexOf(ex); if(idx>=0) state.favorites.splice(idx,1); else state.favorites.push(ex); render(); dbToggleExFav(ex); }));

  el('back-workout',()=>{ state.logStep='workout'; state.searchQ=''; render(); });
  el('back-muscle', ()=>{ state.logStep='muscle';  state.searchQ=''; render(); });
  el('back-exercise',()=>{ state.logStep='exercise'; render(); });
  on('ex-search','input',e=>{ state.searchQ=e.target.value; render(); });
  el('fav-filter',()=>{ state.favFilter=!state.favFilter; render(); });

  document.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click',()=>{ state.setType=b.dataset.toggle; render(); }));

function commitExercise(){
  if(!state.pendingSets.length) return;
  if(!state._currentSession) state._currentSession={id:uid(),date:Date.now(),exercises:[]};
  const working=state.pendingSets.filter(s=>s.type==='working');
  if(working.length){
    const best=working.reduce((a,b)=>b.weight>a.weight||(b.weight===a.weight&&b.reps>a.reps)?b:a);
    const pr=state.prs[state.selectedExercise];
    if(!pr||best.weight>pr.weight||(best.weight===pr.weight&&best.reps>pr.reps)){
      state.prs[state.selectedExercise]={weight:best.weight,reps:best.reps,date:Date.now()};
      dbSavePR(state.selectedExercise,state.prs[state.selectedExercise]);
      toast('🏆 New PR!','var(--amber)');
    }
  }
  state._currentSession.exercises.push({muscle:state.selectedMuscle,name:state.selectedExercise,sets:[...state.pendingSets]});
  state.pendingSets=[];
}

function resumeSession(sessionId){
  const s=state.sessions.find(s=>s.id===sessionId); if(!s) return;
  if(state._currentSession){ toast('Finish your current workout first','var(--red)'); return; }
  state._currentSession={id:s.id,date:s.date,exercises:JSON.parse(JSON.stringify(s.exercises))};
  state.sessions=state.sessions.filter(x=>x.id!==s.id);
  dbDeleteSession(s.id);
  const last=s.exercises[s.exercises.length-1];
  if(last?.type==='cardio'){
    state.logStep='workout';
  } else {
    state.selectedMuscle=last?.muscle||null; state.selectedExercise=null; state.pendingSets=[];
    state.logStep='exercise';
  }
  state.view='log';
  toast('Workout resumed — add more or finish'); render();
}

function exportAllCSV(){
  const date=new Date().toISOString().slice(0,10);
  const rows=[]; const blank=['','','','','','',''];
  rows.push(['WORKOUTS','','','','','','']);
  rows.push(['Date','Muscle Group','Exercise','Set Type','Set #','Weight (lbs)','Reps']);
  state.sessions.forEach(s=>{ const d=new Date(s.date).toLocaleDateString('en-US'); s.exercises.forEach(ex=>{ let wu=0,wk=0; ex.sets.forEach(set=>{ if(set.type==='warmup') wu++; else wk++; rows.push([d,ex.muscle,ex.name,set.type,set.type==='warmup'?wu:wk,set.weight,set.reps]); }); }); });
  rows.push(blank);
  rows.push(['PERSONAL RECORDS','','','','','','']);
  rows.push(['Exercise','Weight (lbs)','Reps','Date','','','']);
  Object.entries(state.prs).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([ex,pr])=>rows.push([ex,pr.weight,pr.reps,fmtDate(pr.date),'','','']));
  rows.push(blank);
  rows.push(['BODY WEIGHT','','','','','','']);
  rows.push(['Date','Weight (lbs)','Weight (kg)','','','','']);
  [...state.weightLog].sort((a,b)=>a.date-b.date).forEach(e=>{ const lbs=e.unit==='lbs'?e.value:kgToLbs(e.value); const kg=e.unit==='kg'?e.value:lbsToKg(e.value); rows.push([fmtDate(e.date),lbs,kg,'','','','']); });
  rows.push(blank);
  rows.push(['NUTRITION','','','','','','']);
  rows.push(['Date','Time','Food / Meal','Calories (kcal)','Protein (g)','Carbs (g)','Fat (g)']);
  [...state.foodLog].sort((a,b)=>a.ts-b.ts).forEach(e=>rows.push([e.date,fmtTime(e.ts),e.name,e.calories,e.protein,e.carbs,e.fat]));
  rows.push(blank);
  rows.push(['MACRO GOALS','','','','','','']);
  rows.push(['Calories (kcal)','Protein (g)','Carbs (g)','Fat (g)','','','']);
  rows.push([state.macroGoals.calories,state.macroGoals.protein,state.macroGoals.carbs,state.macroGoals.fat,'','','']);
  if(state.mealFavorites.length){ rows.push(blank); rows.push(['MEAL FAVORITES','','','','','','']); rows.push(['Name','Calories (kcal)','Protein (g)','Carbs (g)','Fat (g)','','']); state.mealFavorites.forEach(f=>rows.push([f.name,f.calories,f.protein,f.carbs,f.fat,'',''])); }
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`strength-tracker-export-${date}.csv`; a.click();
  toast('Exported! 📥');

function renderProgressChart(points){
  if(points.length<2) return `<div style="text-align:center;color:var(--text-muted);padding:16px;font-size:13px">Log more sessions to see your progression chart</div>`;
  const W=360,H=160;
  const PAD={top:12,right:16,bottom:28,left:44};
  const cW=W-PAD.left-PAD.right, cH=H-PAD.top-PAD.bottom;
  const weights=points.map(p=>p.weight);
  const minW=Math.min(...weights), maxW=Math.max(...weights);
  const wRange=maxW-minW||10;
  const dates=points.map(p=>p.date);
  const minD=Math.min(...dates), maxD=Math.max(...dates);
  const dRange=maxD-minD||1;
  const toX=d=>PAD.left+((d-minD)/dRange)*cW;
  const toY=w=>PAD.top+cH-((w-minW)/wRange)*cH;
  const pts=points.map(p=>({x:toX(p.date),y:toY(p.weight),w:p.weight,d:p.date}));
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const yLabels=[minW,minW+wRange/2,maxW].map(w=>({y:toY(w),label:Math.round(w)}));
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
    ${yLabels.map(l=>`<line x1="${PAD.left}" y1="${l.y.toFixed(1)}" x2="${W-PAD.right}" y2="${l.y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>`).join('')}
    ${yLabels.map(l=>`<text x="${PAD.left-6}" y="${(l.y+4).toFixed(1)}" text-anchor="end" fill="var(--text-muted)" font-size="10" font-family="system-ui">${l.label}</text>`).join('')}
    <text x="${toX(minD).toFixed(1)}" y="${H-4}" text-anchor="start" fill="var(--text-muted)" font-size="10" font-family="system-ui">${fmtDateShort(minD)}</text>
    <text x="${toX(maxD).toFixed(1)}" y="${H-4}" text-anchor="end" fill="var(--text-muted)" font-size="10" font-family="system-ui">${fmtDateShort(maxD)}</text>
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>`).join('')}
  </svg>`;
}

const PRESETS=[30,60,90,120];
function renderTimer(){
  const t=state.timer;
  const pct=t.total>0?(t.remaining/t.total)*100:0;
  const mins=Math.floor(t.remaining/60); const secs=t.remaining%60;
  const display=t.remaining>0?(mins>0?`${mins}:${String(secs).padStart(2,'0')}`:`${secs}s`):(t.total>0?'Rest up!':'Rest Timer');
  const stateClass=t.running?'running':(t.total>0&&t.remaining===0?'done':'');
  return `<div class="timer-card ${stateClass}"><div class="card-title">Rest Timer</div><div class="timer-display ${stateClass}">${display}</div><div class="timer-presets">${PRESETS.map(p=>`<div class="timer-preset ${t.running&&state._lastPreset===p?'active':''}" data-preset="${p}">${p>=60?(p/60)+'m':p+'s'}</div>`).join('')}</div>${t.running?`<div class="timer-progress"><div class="timer-progress-bar" style="width:${pct}%"></div></div><button class="timer-cancel" id="timer-cancel">✕ cancel</button>`:''}</div>`;
}
function timerStart(seconds){ timerStop(); state.timer.remaining=seconds; state.timer.total=seconds; state.timer.running=true; state._lastPreset=seconds; state.timer.interval=setInterval(()=>{ state.timer.remaining=Math.max(0,state.timer.remaining-1); if(state.timer.remaining===0){ timerStop(true); chime(); } updateTimerDOM(); },1000); updateTimerDOM(); }
function timerAdd(seconds){ if(!state.timer.running){ timerStart(seconds); return; } state.timer.remaining+=seconds; state.timer.total+=seconds; state._lastPreset=seconds; updateTimerDOM(); }
function timerStop(expired){ if(state.timer.interval){ clearInterval(state.timer.interval); state.timer.interval=null; } state.timer.running=false; if(!expired){ state.timer.remaining=0; state.timer.total=0; } }
function updateTimerDOM(){
  const t=state.timer; const card=document.querySelector('.timer-card'); if(!card) return;
  const pct=t.total>0?(t.remaining/t.total)*100:0;
  const mins=Math.floor(t.remaining/60); const secs=t.remaining%60;
  const display=t.remaining>0?(mins>0?`${mins}:${String(secs).padStart(2,'0')}`:`${secs}s`):'Rest up!';
  const stateClass=t.running?'running':(t.remaining===0&&t.total>0?'done':'');
  const disp=card.querySelector('.timer-display'); if(disp){ disp.textContent=display; disp.className=`timer-display ${stateClass}`; } card.className=`timer-card ${stateClass}`;
  const bar=card.querySelector('.timer-progress-bar'); if(bar) bar.style.width=pct+'%';
  const cancelBtn=card.querySelector('#timer-cancel');
  if(t.running&&!cancelBtn){ const presetsEl=card.querySelector('.timer-presets'); const progDiv=document.createElement('div'); progDiv.className='timer-progress'; progDiv.innerHTML=`<div class="timer-progress-bar" style="width:${pct}%"></div>`; presetsEl.after(progDiv); const cancelEl=document.createElement('button'); cancelEl.className='timer-cancel'; cancelEl.id='timer-cancel'; cancelEl.textContent='✕ cancel'; cancelEl.addEventListener('click',()=>{ timerStop(false); updateTimerDOM(); }); progDiv.after(cancelEl); }
  else if(!t.running&&cancelBtn){ const prog=card.querySelector('.timer-progress'); if(prog) prog.remove(); cancelBtn.remove(); }
}
function chime(){ try{ const ctx=new(window.AudioContext||window.webkitAudioContext)(); [[880,0,.15],[1108,.18,.15],[880,.36,.2]].forEach(([freq,start,dur])=>{ const osc=ctx.createOscillator(); const gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type='sine'; osc.frequency.setValueAtTime(freq,ctx.currentTime+start); gain.gain.setValueAtTime(0,ctx.currentTime+start); gain.gain.linearRampToValueAtTime(.4,ctx.currentTime+start+.01); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+start+dur); osc.start(ctx.currentTime+start); osc.stop(ctx.currentTime+start+dur+.05); }); setTimeout(()=>ctx.close(),1000); }catch(e){} }
